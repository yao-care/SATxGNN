# Saudi Arabia SFDA Field Mapping Configuration

country_code: "SA"
language: "ar"
regulatory_agency: "SFDA"

data_source:
  name: "SFDA Open Data - Registered Human Drugs List"
  url: "https://www.sfda.gov.sa/en/open-data"
  drugs_list_url: "https://www.sfda.gov.sa/en/drugs-list"
  api_base: "https://developer.sfda.gov.sa/"
  api_doc: "https://developer.sfda.gov.sa/apidoc/registered-drug-service/84"
  format: Excel
  encoding: utf-8
  note: >
    SFDA 在開放資料頁面提供 2023 年本地與非本地人用藥品 Excel 清單。
    本地藥品約 3,073 筆，非本地約 10,295 筆，合計約 13,000+ 筆。

  # 直接下載 URL (2026-03 驗證可用)
  direct_download_urls:
    - name: "Local Human Medicines 2023"
      url: "https://www.sfda.gov.sa/sites/default/files/2023-10/\u0642\u0627\u0626\u0645\u0629-\u0627\u0644\u0623\u062f\u0648\u064a\u0629-\u0627\u0644\u0628\u0634\u0631\u064a\u0629-\u0627\u0644\u0645\u062d\u0644\u064a\u0629-\u0627\u0644\u0645\u0633\u062c\u0644\u0629-2023\u0645.xlsx"
      filename: "sfda_local_human_medicines_2023.xlsx"
    - name: "Non-Local Human Medicines 2023"
      url: "https://www.sfda.gov.sa/sites/default/files/2023-10/\u0642\u0627\u0626\u0645\u0629-\u0627\u0644\u0623\u062f\u0648\u064a\u0629-\u0627\u0644\u0628\u0634\u0631\u064a\u0629-\u0627\u0644\u063a\u064a\u0631-\u0645\u062d\u0644\u064a\u0629-\u0627\u0644\u0645\u0633\u062c\u0644\u0629-2023\u0645.xlsx"
      filename: "sfda_nonlocal_human_medicines_2023.xlsx"

field_mapping:
  # SFDA Excel 欄位 (2026-03 實測)
  license_id: "TradeName"
  brand_name_local: "TradeName"
  brand_name_en: "TradeName"
  ingredients: "ScientificName"
  indication: ""
  dosage_form: ""
  manufacturer: "Manufacturer_Name"
  approval_date: ""
  status: "Status"

withdrawn_statuses:
  - "Cancelled"
  - "Suspended"
  - "Expired"

ingredient_separator: ","
date_format: "%Y-%m-%d"
encoding: "utf-8"
